
#############################################
# packages/smartrec_live_target_enforcement_all.yaml
#
# Live temperature enforcement loop (ALL SmartRec zones)
# - If zone AC is ON, keep its setpoint synced to the zone target sensor
# - Avoid spam: only correct when off by >= 0.5°F
# - If hvac_mode == heat_cool and device exposes low/high, set BOTH
# - Bedrooms also require House Occupied (so we never fight Away logic)
#############################################

automation:
  ########################################################
  # LIVING ROOM (Common Area) — climate.air_conditioner_2
  ########################################################
  - id: lr_live_target_enforcement
    alias: "SmartRec LR - Enforce target temperature (live loop)"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/5"
      - platform: state
        entity_id:
          - sensor.lr_target_f
          - climate.air_conditioner_2
    condition:
      - condition: state
        entity_id: input_boolean.lr_smartrec_enabled
        state: "on"
      - condition: template
        value_template: "{{ states('climate.air_conditioner_2') != 'off' }}"
      - condition: template
        value_template: >
          {{ states('sensor.lr_target_f') not in ['unknown','unavailable','none',''] }}
    action:
      - variables:
          target: "{{ states('sensor.lr_target_f') | float(66) }}"
          hvac_mode: "{{ state_attr('climate.air_conditioner_2','hvac_mode') }}"
          cur_temp: "{{ state_attr('climate.air_conditioner_2','temperature') }}"
          low: "{{ state_attr('climate.air_conditioner_2','target_temp_low') }}"
          high: "{{ state_attr('climate.air_conditioner_2','target_temp_high') }}"
      - choose:
          - conditions: >
              {{ hvac_mode == 'heat_cool'
                 and low is not none and high is not none
                 and ( (low|float(0) - target)|abs >= 0.5
                       or (high|float(0) - target)|abs >= 0.5 ) }}
            sequence:
              - service: climate.set_temperature
                target: { entity_id: climate.air_conditioner_2 }
                data:
                  target_temp_low: "{{ target }}"
                  target_temp_high: "{{ target }}"
          - conditions: >
              {{ cur_temp is not none
                 and ((cur_temp|float(0) - target)|abs >= 0.5) }}
            sequence:
              - service: climate.set_temperature
                target: { entity_id: climate.air_conditioner_2 }
                data:
                  temperature: "{{ target }}"

