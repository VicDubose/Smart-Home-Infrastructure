#############################################
# packages/smartrec_zone_living_room.yaml
#
# Living Room (Common Area) Smart/Adaptive Recovery
# Climate: climate.air_conditioner_2
# Temp:    sensor.shelly_wave_h_t_sensor_air_temperature  (CA sensor)
#
# Logic:
# - CA remains authority
# - Summer => cool
# - Winter => heat
# - Shoulder months use Laundry Room as outside proxy
# - LR >= 84F forces cool
# - Neutral shoulder band uses CA delta with deadband
# - Mid-cycle authority correction
# - Scheduled hard sync checks at 06:00 / 12:00 / 16:00 / 18:00
#############################################

input_boolean:
  lr_smartrec_enabled:
    name: Living Room SmartRec Enabled
    initial: "on"
  lr_recovery_active:
    name: Living Room Recovery Active

input_number:
  lr_target_day_f:
    name: Living Room Target Day (°F)
    min: 60
    max: 80
    step: 0.5
    initial: 72
  lr_target_night_f:
    name: Living Room Target Night (°F)
    min: 60
    max: 80
    step: 0.5
    initial: 66

  lr_rate_cool_f_per_min:
    name: Living Room Learned cool rate (°F/min)
    min: 0.02
    max: 1.0
    step: 0.005
    mode: box
    initial: 0.10
  lr_rate_heat_f_per_min:
    name: Living Room Learned heat rate (°F/min)
    min: 0.02
    max: 1.0
    step: 0.005
    mode: box
    initial: 0.15

  lr_deltat_at_start_f:
    name: Living Room ΔT at start (°F)
    min: 0
    max: 25
    step: 0.1

input_datetime:
  lr_start_time:
    name: Living Room Last start time
    has_date: true
    has_time: true

template:
  - sensor:
      - name: lr_next_aim_ts
        device_class: timestamp
        state: >
          {% set wday = now().weekday() %}
          {% set t_weekday = states('input_datetime.smartrec_weekday_wake_time') %}
          {% set t_weekend = states('input_datetime.smartrec_weekend_wake_time') %}
          {% set target_t = t_weekend if wday in [5,6] else t_weekday %}
          {% if target_t in ['unknown','unavailable',''] %}
            {{ now() }}
          {% else %}
            {% set aim_today = today_at(target_t) %}
            {% if as_timestamp(aim_today) >= as_timestamp(now()) %}
              {{ aim_today }}
            {% else %}
              {{ aim_today + timedelta(days=1) }}
            {% endif %}
          {% endif %}

      - name: lr_minutes_until_aim
        unit_of_measurement: "min"
        state: >
          {% set aim = states('sensor.lr_next_aim_ts') %}
          {% if aim in ['unknown','unavailable',''] %}
            0
          {% else %}
            {{ ((as_datetime(aim) - now()).total_seconds() / 60) | round(0) }}
          {% endif %}

      - name: lr_target_f
        unit_of_measurement: "°F"
        state: >
          {% set day = states('input_number.lr_target_day_f')|float(72) %}
          {% set night = states('input_number.lr_target_night_f')|float(66) %}
          {% set h = now().hour + (now().minute/60) %}

          {% if h >= 17 and h < 21 %}
            {% set p = (h - 17) / 4 %}
            {{ (day + (night-day)*p) | round(1) }}
          {% elif h >= 5 and h < 9 %}
            {% set p = (h - 5) / 4 %}
            {{ (night + (day-night)*p) | round(1) }}
          {% elif (h >= 21) or (h < 5) %}
            {{ night | round(1) }}
          {% else %}
            {{ day | round(1) }}
          {% endif %}

      - name: lr_delta_to_target_f
        unit_of_measurement: "°F"
        state: >
          {% set t = states('sensor.shelly_wave_h_t_sensor_air_temperature') %}
          {% if t in ['unknown','unavailable','none',''] %}
            unknown
          {% else %}
            {{ (t|float) - (states('sensor.lr_target_f')|float) }}
          {% endif %}

      - name: lr_est_minutes_needed
        unit_of_measurement: "min"
        state: >
          {% set d_raw = states('sensor.lr_delta_to_target_f') %}
          {% set d = 0 if d_raw in ['unknown','unavailable','none',''] else (d_raw|float(0)) %}
          {% set cool_rate = states('input_number.lr_rate_cool_f_per_min')|float(0.10) %}
          {% set heat_rate = states('input_number.lr_rate_heat_f_per_min')|float(0.15) %}
          {% if d > 0 %}
            {{ (d / cool_rate) | round(0) }}
          {% elif d < 0 %}
            {{ ((-d) / heat_rate) | round(0) }}
          {% else %}
            0
          {% endif %}

      - name: lr_outside_proxy_temp_f
        unit_of_measurement: "°F"
        state: >
          {% set t = states('sensor.shelly_wave_h_t_sensor_lr_air_temperature') %}
          {% if t in ['unknown','unavailable','none',''] %}
            unknown
          {% else %}
            {{ t|float }}
          {% endif %}

      - name: hvac_mode_authority_living_room
        unique_id: hvac_mode_authority_living_room
        state: >
          {% set ca = states('sensor.shelly_wave_h_t_sensor_air_temperature') %}
          {% set proxy = states('sensor.lr_outside_proxy_temp_f') %}
          {% set delta = states('sensor.lr_delta_to_target_f') %}
          {% set current = states('climate.air_conditioner_2') %}

          {% set ca_ok = ca not in ['unknown','unavailable','none',''] %}
          {% set proxy_ok = proxy not in ['unknown','unavailable','none',''] %}
          {% set delta_ok = delta not in ['unknown','unavailable','none',''] %}

          {% set ca_f = ca|float(0) %}
          {% set proxy_f = proxy|float(0) %}
          {% set delta_f = delta|float(0) %}

          {% if ca_ok and ca_f >= 84 %}
            cool
          {% elif is_state('binary_sensor.hvac_season_summer','on') %}
            cool
          {% elif is_state('binary_sensor.hvac_season_winter','on') %}
            heat
          {% elif proxy_ok and proxy_f < 65 %}
            heat
          {% elif proxy_ok and proxy_f > 72 %}
            cool
          {% elif delta_ok and delta_f >= 0.8 %}
            cool
          {% elif delta_ok and delta_f <= -0.8 %}
            heat
          {% elif current in ['heat','cool'] %}
            {{ current }}
          {% else %}
            cool
          {% endif %}

automation:
  - id: smartrec_lr_start
    alias: "SmartRec LR - Start"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"
    condition:
      - condition: state
        entity_id: input_boolean.lr_smartrec_enabled
        state: "on"
      - condition: template
        value_template: >
          {{ states('climate.air_conditioner_2') != 'off' }}
      - condition: template
        value_template: >
          {{ states('sensor.lr_est_minutes_needed')|int(0)
               >= states('sensor.lr_minutes_until_aim')|int(0)
             and (states('sensor.lr_delta_to_target_f')|float(0) | abs) > 0.2 }}
      - condition: state
        entity_id: input_boolean.lr_recovery_active
        state: "off"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.lr_recovery_active

      - service: input_number.set_value
        target:
          entity_id: input_number.lr_deltat_at_start_f
        data:
          value: >
            {% set raw = states('sensor.lr_delta_to_target_f') %}
            {% if raw in ['unknown','unavailable','none',''] %}
              0
            {% else %}
              {{ [ (raw|float)|abs, 25 ] | min | round(2) }}
            {% endif %}

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.lr_start_time
        data:
          datetime: "{{ now().isoformat() }}"

      - service: climate.set_hvac_mode
        target:
          entity_id: climate.air_conditioner_2
        data:
          hvac_mode: "{{ states('sensor.hvac_mode_authority_living_room') }}"

      - service: climate.set_temperature
        data:
          entity_id: climate.air_conditioner_2
          temperature: "{{ states('sensor.lr_target_f')|float(66) }}"

  - id: smartrec_lr_learn
    alias: "SmartRec LR - Learn & Stop"
    mode: restart
    trigger:
      - platform: template
        value_template: >
          {{ is_state('input_boolean.lr_recovery_active','on')
             and (states('sensor.lr_delta_to_target_f')|float(99) | abs) <= 0.1 }}
    action:
      - variables:
          start: >
            {% set s = states('input_datetime.lr_start_time') %}
            {{ as_datetime(s) if s not in ['unknown','unavailable','none',''] else now() }}
          mins_elapsed: "{{ ((now() - start).total_seconds() / 60) | max(1) }}"
          d_start: "{{ states('input_number.lr_deltat_at_start_f')|float(0.1) }}"
          observed_rate: "{{ (d_start / mins_elapsed) | round(3) }}"
          hvac_mode: "{{ state_attr('climate.air_conditioner_2','hvac_mode') }}"
          old_cool: "{{ states('input_number.lr_rate_cool_f_per_min')|float(0.10) }}"
          old_heat: "{{ states('input_number.lr_rate_heat_f_per_min')|float(0.15) }}"
          alpha: 0.30
          new_cool: "{{ ((1 - alpha) * old_cool + alpha * observed_rate) | round(3) }}"
          new_heat: "{{ ((1 - alpha) * old_heat + alpha * observed_rate) | round(3) }}"
      - choose:
          - conditions: "{{ hvac_mode in ['cool','dry'] }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.lr_rate_cool_f_per_min
                data:
                  value: "{{ [ new_cool|float(0.02), 0.02 ] | max }}"
          - conditions: []
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.lr_rate_heat_f_per_min
                data:
                  value: "{{ [ new_heat|float(0.02), 0.02 ] | max }}"
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.lr_recovery_active

  - id: hvac_lr_follow_authority_midcycle
    alias: "HVAC LR - Follow authority mid-cycle"
    mode: restart
    trigger:
      - platform: state
        entity_id: sensor.hvac_mode_authority_living_room
        to:
          - "heat"
          - "cool"
    condition:
      - condition: template
        value_template: "{{ states('climate.air_conditioner_2') != 'off' }}"
      - condition: template
        value_template: "{{ states('climate.air_conditioner_2') in ['heat','cool'] }}"
      - condition: template
        value_template: "{{ states('climate.air_conditioner_2') != states('sensor.hvac_mode_authority_living_room') }}"
    action:
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.air_conditioner_2
        data:
          hvac_mode: "{{ states('sensor.hvac_mode_authority_living_room') }}"

  - id: hvac_lr_scheduled_mode_enforcement
    alias: "HVAC LR - Scheduled authority enforcement"
    mode: single
    trigger:
      - platform: time
        at: "06:00:00"
      - platform: time
        at: "12:00:00"
      - platform: time
        at: "16:00:00"
      - platform: time
        at: "18:00:00"
    condition:
      - condition: template
        value_template: "{{ states('climate.air_conditioner_2') != 'off' }}"
      - condition: template
        value_template: "{{ states('sensor.hvac_mode_authority_living_room') in ['heat','cool'] }}"
      - condition: template
        value_template: >
          {{ states('climate.air_conditioner_2') != states('sensor.hvac_mode_authority_living_room') }}
    action:
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.air_conditioner_2
        data:
          hvac_mode: "{{ states('sensor.hvac_mode_authority_living_room') }}"
